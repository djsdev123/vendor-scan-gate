name: Gitly Join
on:
  pull_request_target:
    types: [opened]

permissions:
  contents: read
  pull-requests: write

jobs:
  process:
    runs-on: ubuntu-latest
    if: startsWith(github.event.pull_request.title, 'gitly-join:')
    env:
      GH_TOKEN: ${{ github.token }}
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2

      - name: Process join request
        env:
          PRIVATE_REPO_PAT: ${{ secrets.PRIVATE_REPO_PAT }}
          PR_NUMBER: ${{ github.event.pull_request.number }}
          PR_AUTHOR: ${{ github.event.pull_request.user.login }}
          PR_TITLE: ${{ github.event.pull_request.title }}
        run: |
          set -euo pipefail
          USERNAME="${PR_TITLE#gitly-join: }"

          if [ "$USERNAME" != "$PR_AUTHOR" ]; then
            gh pr comment "$PR_NUMBER" --body "gitly: rejected - username mismatch"
            gh pr close "$PR_NUMBER"; exit 0
          fi

          if ! [[ "$USERNAME" =~ ^[a-zA-Z0-9]([a-zA-Z0-9-]{0,37}[a-zA-Z0-9])?$ ]]; then
            gh pr comment "$PR_NUMBER" --body "gitly: rejected - invalid username"
            gh pr close "$PR_NUMBER"; exit 0
          fi

          PRIVATE_REPO=$(grep 'private_repo:' .gitly/config.yml | awk '{print $2}' | tr -d '"')
          PERMISSION=$(grep 'permission:' .gitly/config.yml | awk '{print $2}' | tr -d '"')
          PERMISSION="${PERMISSION:-push}"

          HTTP_CODE=$(curl -s -o /dev/null -w "%{http_code}" -X PUT \
            -H "Authorization: Bearer $PRIVATE_REPO_PAT" \
            -H "Accept: application/vnd.github+json" \
            -d "{\"permission\":\"$PERMISSION\"}" \
            "https://api.github.com/repos/$PRIVATE_REPO/collaborators/$USERNAME")

          if [ "$HTTP_CODE" = "201" ] || [ "$HTTP_CODE" = "204" ]; then
            gh pr comment "$PR_NUMBER" --body "gitly: @${USERNAME} invited to ${PRIVATE_REPO}"
          else
            gh pr comment "$PR_NUMBER" --body "gitly: rejected - failed to add collaborator (HTTP $HTTP_CODE)"
          fi
          gh pr close "$PR_NUMBER"
